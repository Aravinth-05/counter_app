# secret.yaml
#
# Secrets store sensitive data like passwords.
# In docker-compose, we put passwords directly in the YAML (bad for production).
# In K8s, Secrets are a separate object -- you can control who can read them.
#
# The values below are base64-encoded (not encrypted, just encoded).
# To encode a value yourself:
#   echo -n "counter_pass" | base64
#   Result: Y291bnRlcl9wYXNz
#
# base64 is NOT security. In real production, you'd use something like
# HashiCorp Vault or AWS Secrets Manager. But for learning, this is fine.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: counter-app
type: Opaque
data:
  # echo -n "counter_user" | base64 = Y291bnRlcl91c2Vy
  POSTGRES_USER: Y291bnRlcl91c2Vy # gitleaks:allow
  # echo -n "counter_pass" | base64 = Y291bnRlcl9wYXNz
  POSTGRES_PASSWORD: Y291bnRlcl9wYXNz # gitleaks:allow
  # echo -n "counter_db" | base64 = Y291bnRlcl9kYg==
  POSTGRES_DB: Y291bnRlcl9kYg== # gitleaks:allow
